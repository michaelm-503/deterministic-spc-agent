name: CI

on:
  push:
    branches:
      - main
      - phase-4
      - dev
  pull_request:
    branches:
      - main

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Miniforge (conda-forge only)
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-variant: Miniforge3
          miniforge-version: latest
          auto-activate: false
          use-mamba: true
          conda-remove-defaults: true

      - name: Create environment from environment.yml
        shell: bash -l {0}
        run: |
          mamba env remove -n agentic_mfg -y || true
          mamba env create -n agentic_mfg -f environment.yml

      - name: Verify Python and core imports
        shell: bash -l {0}
        run: |
          mamba run -n agentic_mfg python --version
          mamba run -n agentic_mfg python -c "import sys; print(sys.executable)"
          mamba run -n agentic_mfg python -c "import duckdb, pandas, numpy, matplotlib"

      - name: Show installed packages
        shell: bash -l {0}
        run: |
          mamba run -n agentic_mfg conda list

      - name: Run smoke test and verify artifacts
        shell: bash -l {0}
        run: |
          set -euo pipefail

          # Ensure clean run directory
          rm -rf runs
          mkdir -p runs

          # Run smoke test (should generate a run directory)
          mamba run -n agentic_mfg python tests/smoke_test.py

          # Locate most recent run directory
          RUN_DIR="$(ls -1dt runs/*/ | head -n 1)"
          echo "Newest run_dir: ${RUN_DIR}"

          # Verify hashes and artifacts
          mamba run -n agentic_mfg python -m spc_agent verify "${RUN_DIR}"
