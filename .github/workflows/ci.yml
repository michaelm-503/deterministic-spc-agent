name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Miniforge (conda-forge only)
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-variant: Miniforge3
          miniforge-version: latest
          auto-activate: false
          use-mamba: true
          conda-remove-defaults: true
          environment-file: environment.yml
          activate-environment: agentic_mfg

      - name: Verify Python
        shell: bash -l {0}
        run: |
          python --version
          python -c "import sys; print(sys.executable)"

      - name: Run smoke test
        shell: bash -l {0}
        run: |
          python tests/smoke_test.py